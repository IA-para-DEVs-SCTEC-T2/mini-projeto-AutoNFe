<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoNFe — Recuperar Senha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/auth.css" />
</head>
<body class="auth-body">

  <div class="auth-card">
    <div class="auth-logo">
      <span class="auth-logo-text">AutoNFe</span>
      <span class="auth-logo-sub">SCTEC v1.0</span>
    </div>

    <h1 class="auth-title">Recuperar senha</h1>
    <p class="auth-subtitle">Informe seu e-mail cadastrado para receber uma senha temporária.</p>

    {% if erro %}
    <div class="auth-alert auth-alert-error">{{ erro }}</div>
    {% endif %}

    {% if sucesso %}
    <div class="auth-alert auth-alert-success">{{ sucesso }}</div>
    <div style="margin-top:20px;text-align:center">
      <a href="/login" class="auth-link">← Voltar ao login</a>
    </div>
    {% else %}
    <form method="POST" action="/esqueci-senha" class="auth-form">
      <div class="form-group">
        <label class="form-label">E-mail cadastrado</label>
        <input type="email" name="email" class="form-input"
               placeholder="seu@email.com" required autofocus />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Enviar senha temporária</button>
    </form>
    <div class="auth-links">
      <a href="/login" class="auth-link">← Voltar ao login</a>
    </div>
    {% endif %}
  </div>

  <script src="/static/js/auth.js"></script>
</body>
</html>
