<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoNFe — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/auth.css" />
</head>
<body class="auth-body">

  <div class="auth-card">
    <div class="auth-logo">
      <span class="auth-logo-text">AutoNFe</span>
      <span class="auth-logo-sub">SCTEC v1.0</span>
    </div>

    <h1 class="auth-title">Entrar no sistema</h1>

    {% if erro %}
    <div class="auth-alert auth-alert-error">{{ erro }}</div>
    {% endif %}

    {% if info %}
    <div class="auth-alert auth-alert-info">{{ info }}</div>
    {% endif %}

    <form method="POST" action="/login" class="auth-form" id="formLogin">
      <div class="form-group">
        <label class="form-label">Usuário ou E-mail</label>
        <input type="text" name="login" class="form-input" placeholder="nome ou email@exemplo.com"
               value="{{ login_val or '' }}" required autofocus />
      </div>

      <div class="form-group">
        <label class="form-label">Senha</label>
        <div class="input-senha-wrap">
          <input type="password" name="senha" id="inputSenha" class="form-input" placeholder="••••••••" required />
          <button type="button" class="btn-ver-senha" onclick="toggleSenha('inputSenha', this)" tabindex="-1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full">Entrar</button>
    </form>

    <div class="auth-links">
      <a href="/esqueci-senha" class="auth-link">Esqueceu sua senha?</a>
    </div>
  </div>

  <script src="/static/auth.js"></script>
</body>
</html>
